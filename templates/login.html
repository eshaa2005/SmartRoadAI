<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>SmartRoad AI — Login</title>
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Barlow:wght@300;400;600;700&family=Barlow+Condensed:wght@700;800&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:      #0a0c0e;
    --surface: #111418;
    --card:    #181d22;
    --border:  #2a3038;
    --accent:  #f0c040;
    --danger:  #e03030;
    --text:    #e8eaec;
    --muted:   #6a7480;
    --mono:    'Space Mono', monospace;
    --sans:    'Barlow', sans-serif;
    --cond:    'Barlow Condensed', sans-serif;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    min-height: 100vh; background: var(--bg);
    color: var(--text); font-family: var(--sans);
    display: flex; align-items: center; justify-content: center;
  }

  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background: repeating-linear-gradient(
      0deg, transparent, transparent 2px,
      rgba(0,0,0,0.07) 2px, rgba(0,0,0,0.07) 4px
    );
  }

  /* Grid background */
  body::after {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0;
    background-image:
      linear-gradient(rgba(240,192,64,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(240,192,64,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
  }

  .wrap {
    width: 100%; max-width: 400px; padding: 24px 20px;
    position: relative; z-index: 1;
  }

  /* Logo */
  .logo-block { text-align: center; margin-bottom: 36px; }
  .logo {
    font-family: var(--cond); font-size: 32px; font-weight: 800;
    letter-spacing: 2px; color: var(--accent);
  }
  .logo span { color: var(--text); }
  .logo-sub {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    letter-spacing: 3px; text-transform: uppercase; margin-top: 4px;
  }

  /* Card */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 8px; padding: 28px 24px;
  }

  .card-title {
    font-family: var(--mono); font-size: 11px; font-weight: 700;
    color: var(--muted); text-transform: uppercase; letter-spacing: 2px;
    margin-bottom: 20px; text-align: center;
  }

  /* Inputs */
  .field { margin-bottom: 14px; }
  .field label {
    display: block; font-family: var(--mono); font-size: 9px;
    color: var(--muted); text-transform: uppercase; letter-spacing: 1.5px;
    margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 12px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; color: var(--text);
    font-family: var(--mono); font-size: 14px;
    outline: none; transition: border-color 0.2s;
  }
  .field input:focus { border-color: var(--accent); }
  .field input::placeholder { color: var(--muted); }

  /* Login button */
  .btn-login {
    width: 100%; padding: 14px;
    font-family: var(--cond); font-size: 16px; font-weight: 800;
    letter-spacing: 3px; text-transform: uppercase;
    background: var(--accent); color: #0a0c0e;
    border: none; border-radius: 4px; cursor: pointer;
    margin-top: 6px; transition: all 0.15s;
  }
  .btn-login:active { transform: scale(0.98); }
  .btn-login:disabled { opacity: 0.5; cursor: not-allowed; }

  /* Error */
  .error-msg {
    font-family: var(--mono); font-size: 11px; color: var(--danger);
    text-align: center; margin-top: 12px; min-height: 18px;
  }

  /* Hint */
  .hint {
    margin-top: 20px; padding: 12px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 4px; border-left: 3px solid var(--accent);
  }
  .hint-title {
    font-family: var(--mono); font-size: 9px; color: var(--accent);
    text-transform: uppercase; letter-spacing: 1px; margin-bottom: 6px;
  }
  .hint-row {
    font-family: var(--mono); font-size: 10px; color: var(--muted);
    margin-bottom: 3px;
  }
  .hint-row span { color: var(--text); }

  /* Loading spinner */
  .spinner {
    display: inline-block; width: 14px; height: 14px;
    border: 2px solid rgba(0,0,0,0.3); border-top-color: #000;
    border-radius: 50%; animation: spin 0.6s linear infinite;
    margin-right: 6px; vertical-align: middle;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>
<div class="wrap">
  <div class="logo-block">
    <div class="logo">SMART<span>ROAD</span> AI</div>
    <div class="logo-sub">Road Damage Detection System</div>
  </div>

  <div class="card">
    <div class="card-title">Sign In</div>

    <div class="field">
      <label>Username</label>
      <input type="text" id="username" placeholder="Enter username" autocomplete="username" autocapitalize="none">
    </div>

    <div class="field">
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password" autocomplete="current-password">
    </div>

    <button class="btn-login" id="btn-login" onclick="doLogin()">LOGIN</button>
    <div class="error-msg" id="error-msg"></div>
  </div>

  <div class="hint">
    <div class="hint-title">Default Credentials</div>
    <div class="hint-row">Admin &nbsp;: <span>admin / admin123</span></div>
    <div class="hint-row">User 1 : <span>user1 / pass123</span></div>
    <div class="hint-row">User 2 : <span>user2 / pass456</span></div>
  </div>
</div>

<script>
  // Press Enter to login
  document.addEventListener("keydown", e => { if (e.key === "Enter") doLogin(); });

  async function doLogin() {
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();
    const btn      = document.getElementById("btn-login");
    const errEl    = document.getElementById("error-msg");

    if (!username || !password) {
      errEl.textContent = "Please enter username and password";
      return;
    }

    btn.disabled   = true;
    btn.innerHTML  = '<span class="spinner"></span>Signing in...';
    errEl.textContent = "";

    try {
      const res  = await fetch("/api/login", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({ username, password })
      });
      const data = await res.json();

      if (res.ok) {
        // Redirect based on role
        if (data.role === "admin") {
          window.location.href = "/dashboard";
        } else {
          window.location.href = "/scan";
        }
      } else {
        errEl.textContent = data.error || "Login failed";
        btn.disabled  = false;
        btn.innerHTML = "LOGIN";
      }
    } catch(e) {
      errEl.textContent = "Server error. Is Flask running?";
      btn.disabled  = false;
      btn.innerHTML = "LOGIN";
    }
  }
</script>
</body>
</html>
